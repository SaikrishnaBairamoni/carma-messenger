name: Docker

on:
  push:


jobs:
  docker:
    runs-on: ubuntu-latest

    # Define the matrix of Dockerfile names
    strategy:
      matrix:
        dockerfile: [Dockerfile, Dockerfile, Dockerfile]  # Add your Dockerfile names here

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Docker Image
        run: |
          directory=$(dirname "${{ matrix.dockerfile }}")
          dockerfile="${{ matrix.dockerfile }}"
          image_name="carma-messenger:$(basename $directory)"
          echo "Building $image_name from $dockerfile in $directory"
          docker build -t $image_name -f "$directory/$dockerfile" "$directory"
          echo "Pushing $image_name"
          docker push $image_name
