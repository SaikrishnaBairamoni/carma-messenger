name: Docker

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - chevrolet_tahoe_2018
          - development
          - carma-messenger-ui
          - carma-messenger-core

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          if [ "${{ matrix.service }}" == "carma-messenger-core" ]; then
            docker build -t usdotfhwastoldev/carma-messenger-core:${{ github.ref_name }}-carma-messenger-core -f carma-messenger-core/Dockerfile .
            docker push usdotfhwastoldev/carma-messenger-core:${{ github.ref_name }}-carma-messenger-core
          elif [ "${{ matrix.service }}" == "carma-messenger-ui" ]; then
            docker build -t usdotfhwastoldev/carma-messenger-ui:${{ github.ref_name }}-carma-messenger-ui -f carma-messenger-ui/Dockerfile .
            docker push usdotfhwastoldev/carma-messenger-ui:${{ github.ref_name }}-carma-messenger-ui
          elif [ "${{ matrix.service }}" == "development" ]; then
            docker build -t usdotfhwastoldev/carma-messenger-config:${{ github.ref_name }}-development -f carma-messenger-config/development/Dockerfile .
            docker push usdotfhwastoldev/carma-messenger-config:${{ github.ref_name }}-development
          elif [ "${{ matrix.service }}" == "chevrolet_tahoe_2018" ]; then
            docker build -t usdotfhwastoldev/carma-messenger-config:${{ github.ref_name }}-chevrolet_tahoe_2018 -f carma-messenger-config/chevrolet_tahoe_2018/Dockerfile .
            docker push usdotfhwastoldev/carma-messenger-config:${{ github.ref_name }}-chevrolet_tahoe_2018
          fi
