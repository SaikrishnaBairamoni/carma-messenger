name: Docker

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - chevrolet_tahoe_2018
          - development
          - carma-messenger-ui
          - carma-messenger-core

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          if [ "${{ matrix.service }}" == "carma-messenger-core" ]; then
            tag="usdotfhwastoldev/carma-messenger-core:${{ github.ref_name }}-carma-messenger-core"
          elif [ "${{ matrix.service }}" == "carma-messenger-ui" ]; then
            tag="usdotfhwastoldev/carma-messenger-ui:${{ github.ref_name }}-carma-messenger-ui"
          elif [ "${{ matrix.service }}" == "development" ]; then
            tag="usdotfhwastoldev/carma-messenger-config:${{ github.ref_name }}-development"
          elif [ "${{ matrix.service }}" == "chevrolet_tahoe_2018" ]; then
            tag="usdotfhwastoldev/carma-messenger-config:${{ github.ref_name }}-chevrolet_tahoe_2018"
          fi
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v3
        with:
          context: ${{ matrix.service }}
          push: true
          tags: ${{ tag }}
