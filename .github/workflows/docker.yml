name: Docker

on:
  push:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Find all Dockerfiles in the repository
      - name: Find Dockerfiles
        id: find-dockerfiles
        run: |
          echo "::set-output name=dockerfiles::$(find . -type f -name 'Dockerfile')"
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Loop through each Dockerfile and build the corresponding image
      - name: Build Docker Images
        run: |
          IFS=$'\n' # Set delimiter to newline
          for dockerfile in ${{ steps.find-dockerfiles.outputs.dockerfiles }}; do
            directory=$(dirname "$dockerfile")
            image_name="carma-messenger:$(basename $directory)"
            echo "Building $image_name from $dockerfile"
            docker build -t $image_name -f $dockerfile $directory
          done
