name: Docker

on:
  push:

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile: ["carma-messenger-config/chevrolet_tahoe_2018/Dockerfile", "carma-messenger-config/development/Dockerfile", "carma-messenger-core/Dockerfile", "carma-messenger-ui/Dockerfile"]  

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build
        uses: docker/build-push-action@v3
        with:
          context: $GITHUB_WORKSPACE
          file: ${{ matrix.dockerfile }}
          