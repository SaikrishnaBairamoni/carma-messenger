name: Docker

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - chevrolet_tahoe_2018
          - development
          - carma-messenger-ui
          - carma-messenger-core

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: chevrolet_tahoe_2018
        uses: docker/build-push-action@v3
        with:
          context: carma-messenger-config/${{ matrix.service }}/
          push: true
          tags: usdotfhwastoldev/carma-messenger-config:${{ github.ref_name }}-chevrolet_tahoe_2018

      - name: development
        uses: docker/build-push-action@v3
        with:
          context: carma-messenger-config/${{ matrix.service }}/
          push: true
          tags: usdotfhwastoldev/carma-messenger-config:${{ github.ref_name }}-development

      - name: carma-messenger-ui
        uses: docker/build-push-action@v3
        with:
          context: carma-messenger-ui/${{ matrix.service }}/
          push: true
          tags: usdotfhwastoldev/carma-messenger-ui:${{ github.ref_name }}-carma-messenger-ui

      - name: carma-messenger-core
        uses: docker/build-push-action@v3
        with:
          context: carma-messenger-core/${{ matrix.service }}/
          push: true
          tags: usdotfhwastoldev/carma-messenger-core:${{ github.ref_name }}-carma-messenger-core