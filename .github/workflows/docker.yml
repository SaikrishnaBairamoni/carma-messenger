name: Docker

on:
  push:
jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile: [Dockerfile, Dockerfile, Dockerfile]  # Specify 'Dockerfile' for each subdirectory

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        run: |
          directory=$(dirname "${{ matrix.dockerfile }}")
          image_name="your-image-name:$(basename $directory)"
          echo "Building $image_name from ${{ matrix.dockerfile }}"
          docker build -t $image_name -f ${{ matrix.dockerfile }} $directory
